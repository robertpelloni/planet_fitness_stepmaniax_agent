{% extends "base.html" %}

{% block title %}Forgot Password - StepManiaX B2B{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center py-12">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
        <div class="bg-slate-900 p-8 text-center">
            <h2 class="text-white text-2xl font-bold italic uppercase tracking-widest">Account Recovery</h2>
            <p class="text-slate-400 text-sm mt-2 font-medium">Reset your secure access credentials</p>
        </div>

        <form method="POST" class="p-8 space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-widest block">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" name="email" required autofocus
                        class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl bg-slate-50 focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:bg-white transition-all text-sm"
                        placeholder="your@email.com">
                </div>
            </div>

            <button type="submit" class="w-full py-4 bg-yellow-400 hover:bg-yellow-500 text-black rounded-xl font-bold shadow-lg transition-all transform hover:-translate-y-0.5 active:scale-95 uppercase tracking-widest text-sm">
                Send Reset Link
            </button>

            <div class="text-center">
                <a href="{{ url_for('auth.login') }}" class="text-xs font-bold text-slate-400 hover:text-slate-600 transition-colors uppercase tracking-widest">
                    ← Back to Login
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
