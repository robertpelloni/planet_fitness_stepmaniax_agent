{% extends "base.html" %}

{% block title %}Reset Password - StepManiaX B2B{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center py-12">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
        <div class="bg-slate-900 p-8 text-center">
            <h2 class="text-white text-2xl font-bold italic uppercase tracking-widest">New Credentials</h2>
            <p class="text-slate-400 text-sm mt-2 font-medium">Create a new secure password</p>
        </div>

        <form method="POST" class="p-8 space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

            <div class="space-y-4">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest block">New Password</label>
                    <input type="password" name="password" required
                        class="block w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50 focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:bg-white transition-all text-sm"
                        placeholder="••••••••">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest block">Confirm Password</label>
                    <input type="password" name="confirm_password" required
                        class="block w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50 focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:bg-white transition-all text-sm"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="w-full py-4 bg-yellow-400 hover:bg-yellow-500 text-black rounded-xl font-bold shadow-lg transition-all transform hover:-translate-y-0.5 active:scale-95 uppercase tracking-widest text-sm">
                Reset Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
