{% for log, member_name in activity %}
<div class="p-4 hover:bg-slate-50 transition-colors">
    <div class="flex justify-between items-center mb-1">
        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">{{ log.timestamp.split(' ')[1] }}</span>
        <span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-1.5 py-0.5 rounded uppercase">{{ log.scans_count }} Scans</span>
    </div>
    <p class="text-xs font-bold text-slate-700">
        {{ member_name or "Anonymous User" }}
        <span class="text-slate-400 font-medium">on UNIT-{{ log.equipment_id }}</span>
    </p>
</div>
{% else %}
<div class="p-12 text-center text-slate-400 italic text-xs">Waiting for live activity...</div>
{% endfor %}
