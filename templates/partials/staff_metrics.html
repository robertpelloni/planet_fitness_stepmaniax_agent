{% for unit in metrics %}
<div class="mb-4 last:mb-0">
    <div class="flex justify-between items-center mb-1">
        <span class="text-xs font-bold text-slate-700">{{ unit.equipment_name }}</span>
        <span class="text-[10px] font-black {{ 'text-green-600' if unit.uptime_percent >= 95 else 'text-red-600' }}">
            {{ unit.uptime_percent }}%
        </span>
    </div>
    <div class="h-1.5 bg-slate-100 rounded-full overflow-hidden">
        <div class="h-full {{ 'bg-green-500' if unit.uptime_percent >= 95 else 'bg-red-500' }}" style="width: {{ unit.uptime_percent }}%;"></div>
    </div>
    <div class="flex justify-between mt-1 text-[10px] text-slate-400 font-medium">
        <span>Location: {{ unit.location }}</span>
        <span class="{{ 'text-green-500' if unit.is_online else 'text-red-500' }}">{{ 'ONLINE' if unit.is_online else 'OFFLINE' }}</span>
    </div>
</div>
{% endfor %}
